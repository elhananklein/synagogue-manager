  <!-- outer dark keyline -->
  <path fill="none" stroke="#5b430f" stroke-width="1.4" opacity="0.55"
        d="M5 5 H115 V115 H5 Z"/>
  <!-- corner diamonds -->
  <g fill="#fff4cf" stroke="#8a6a22" stroke-width="0.8">
    <rect x="11.5" y="11.5" width="13" height="13" transform="rotate(45 18 18)"/>
    <rect x="95.5" y="11.5" width="13" height="13" transform="rotate(45 102 18)"/>
    <rect x="11.5" y="95.5" width="13" height="13" transform="rotate(45 18 102)"/>
    <rect x="95.5" y="95.5" width="13" height="13" transform="rotate(45 102 102)"/>
  </g>
  <!-- edge beads (centered in the tiling slice 38..82) -->
  <g fill="#fff4cf">
    <circle cx="49" cy="16.5" r="3"/><circle cx="71" cy="16.5" r="3"/>
    <circle cx="49" cy="103.5" r="3"/><circle cx="71" cy="103.5" r="3"/>
    <circle cx="16.5" cy="49" r="3"/><circle cx="16.5" cy="71" r="3"/>
    <circle cx="103.5" cy="49" r="3"/><circle cx="103.5" cy="71" r="3"/>
  </g>
</svg>

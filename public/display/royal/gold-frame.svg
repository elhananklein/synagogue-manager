<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Ornate gold frame">
  <defs>
    <linearGradient id="gf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe9a8"/>
      <stop offset="0.5" stop-color="#caa24a"/>
      <stop offset="1" stop-color="#8a6a22"/>
    </linearGradient>
  </defs>
  <!-- outer gold ring -->
  <path fill="url(#gf)" fill-rule="evenodd"
        d="M3 3 H117 V117 H3 Z M30 30 H90 V90 H30 Z"/>
  <!-- inner dark keyline -->
  <path fill="none" stroke="#5b430f" stroke-width="1.4" opacity="0.7"
